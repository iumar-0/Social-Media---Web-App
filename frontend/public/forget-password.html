<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatterra | Forgot Password</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./stylesheets/forget-password.css">
</head>

<body>
    <div class="auth-container">
        <div id="requestState">
            <div class="header">
                <div class="logo">
                    <i data-lucide="target"></i>
                    <span>Chatterra</span>
                </div>
                <h1>Forgot Password?</h1>
                <p>Enter your email and we'll send you a link to reset your password.</p>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="emailInput" placeholder="name@example.com" spellcheck="false">
                <p class="err-message-email display-none"></p>
            </div>

            <button class="btn-primary" id="sendBtn">
                <span>Send Reset Link</span>
            </button>

            <div class="footer">
                <a href="/login.html">Back to Sign In</a>
            </div>
        </div>

        <div id="successState" class="display-none">
            <div class="success-icon-wrapper">
                <div class="pulse"></div>
                <i data-lucide="check-circle-2" class="success-icon"></i>
            </div>
            <h2 class="text-heading">Check your email</h2>
            <p>We've sent a password recovery link to <br><strong id="displayEmail"></strong></p>
            <button class="btn-secondary" onclick="location.reload()">Back</button>
            <div class="footer">
                <a href="/login.html">Back to Login In</a>
            </div>
        </div>
    </div>

    <script src="./javascripts/forget-password.js"></script>
</body>

</html>
