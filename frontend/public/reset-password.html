<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatterra | Reset Password</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./stylesheets/reset-password.css">
</head>

<body>
    <div class="auth-container">
        <div id="loadingState" class="state ">
            <div class="spinner"></div>
            <p>Verifying secure link...</p>
        </div>

        <div id="formState" class="state display-none">
            <div class="header">
                <div class="logo">
                    <i data-lucide="shield-check"></i>
                    <span>Chatterra</span>
                </div>
                <h1>New Password</h1>
                <p>Please enter a strong password to secure your account.</p>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password-input-1" class="password-field" placeholder="••••••••">
                    <button class="eye-btn" onclick="togglePassword('password-input-1','eye1')" type="button"
                        aria-label="Toggle confirm password">
                        <svg id="eye1" width="18" height="18" viewBox="0 0 24 24" fill="grey" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
                <p class="error-message display-none err-message-p-1">121</p>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password-input-2" class="password-field" placeholder="••••••••">
                    <button class="eye-btn" onclick="togglePassword('password-input-2','eye2')" type="button"
                        aria-label="Toggle confirm password">
                        <svg id="eye2" width="18" height="18" viewBox="0 0 24 24" fill="grey" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg> </button>
                </div>
                <p class="error-message display-none err-message-p-2">121</p>

            </div>
            <button class="btn-primary" id="updateBtn">Update Password</button>
        </div>

        <div id="successState" class="state display-none">
            <h2>Password Updated</h2>
            <p>Your security credentials have been successfully updated.</p>
            <button class="btn-primary" onclick="window.location.replace('/feed.html')">Back home</button>
        </div>
    </div>

    <script src="./javascripts/reset-password.js"></script>
</body>

</html>
