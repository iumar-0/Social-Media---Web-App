<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Follow Requests</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .topbar {
            background: #fff;
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .badge {
            background: #e74c3c;
            color: #fff;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 20px;
            display: none;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state span {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .request-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .request-card {
            background: #fff;
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .request-card.removing {
            animation: slideOut 0.3s ease forwards;
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }

            to {
                opacity: 0;
                transform: translateX(40px);
            }
        }

        .avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .info {
            flex: 1
        }

        .info strong {
            display: block;
            font-size: 14px;
            font-weight: 600;
        }

        .info span {
            font-size: 12px;
            color: #999;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-accept {
            background: #3897f0;
            color: #fff;
            border: none;
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-accept:hover {
            background: #2980d9
        }

        .btn-delete {
            background: #f0f0f0;
            color: #333;
            border: none;
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-delete:hover {
            background: #e0e0e0
        }

        .btn-accept:disabled,
        .btn-delete:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        .live-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .display-none {
            display: none;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <h1>Follow Requests</h1>
        <span class="badge" id="requestBadge">0</span>
    </div>

    <div class="container">
        <div class="live-label">
            <span class="live-dot"></span>
            Live updates on
        </div>

        <div id="emptyState" class="empty-state">
            <span>👥</span>
            <p>No pending requests</p>
        </div>

        <div class="request-list" id="requestList"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const DEFAULT_PROFILE_IMAGE = "https://res.cloudinary.com/deklbsgkm/image/upload/default_Photo_insta_iz3kev.jpg"

        // ─────────────────────────
        // Socket connection
        // ─────────────────────────
        const socket = io("http://localhost:3000", {
            withCredentials: true
        })

        socket.on("connect", () => {
            console.log("connected:", socket.id)
        })

        socket.on("connect_error", (error) => {
            if (error.message === "TOKEN_NOT_FOUND" ||
                error.message === "TOKEN_EXPIRED") {
                window.location.replace("/login.html")
            }
        })

        // ─────────────────────────
        // Live follow request
        // ─────────────────────────
        socket.on("follow-request", (response) => {
            console.log("new request:", response)

            // add new request card to top of list
            addRequestCard(response.requester)

            // update badge
            updateBadge(1)
        })
        socket.on("delete-request", (response) => {
            console.log("new request:", response)

            // add new request card to top of list
            deleteCard(response.data.deletedID);
        });

        async function deleteCard(userID) {
            let deleteDiv = document.querySelector(`[data-followid='${userID}']`);
            if (!deleteDiv) return;
            deleteDiv.innerHTML = "";
            deleteDiv.classList.add("display-none");
            deleteDiv.dataset.followid = "";
        }

        // ─────────────────────────
        // Load existing requests
        // ─────────────────────────
        async function loadRequests() {
            try {
                const res = await fetch("http://localhost:3000/v1/user/requests/pending", {
                    credentials: "include"
                })
                const data = await res.json()

                if (!data.success) return

                const requests = data.data

                if (!requests.length) {
                    showEmptyState()
                    return
                }

                hideEmptyState()
                requests.forEach(req => addRequestCard(req.follower, req._id))
                updateBadge(requests.length)

            } catch (error) {
                console.log(error)
            }
        }

        // ─────────────────────────
        // Add request card to UI
        // ─────────────────────────
        function addRequestCard(user, requestId) {
            hideEmptyState()

            const list = document.getElementById("requestList")

            const card = document.createElement("div")
            card.classList.add("request-card")
            card.id = `request-${user._id}`
            card.dataset.followid = user._id;
            card.innerHTML = `
        <img 
            class="avatar" 
            src="${user.profile?.url || DEFAULT_PROFILE_IMAGE}" 
            onerror="this.src='${DEFAULT_PROFILE_IMAGE}'"
        />
        <div class="info">
            <strong>${user.name || user.username}</strong>
            <span>@${user.username}</span>
        </div>
        <div class="actions">
            <button 
                class="btn-accept" 
                onclick="handleRequest('accept', '${user._id}', this)">
                Accept
            </button>
            <button 
                class="btn-delete" 
                onclick="handleRequest('delete', '${user._id}', this)">
                Delete
            </button>
        </div>
    `

            // add to top of list
            list.prepend(card)
        }

        // ─────────────────────────
        // Accept or Delete request
        // ─────────────────────────
        async function handleRequest(action, requesterID, btn) {
            const card = document.getElementById(`request-${requesterID}`)

            // disable both buttons
            card.querySelectorAll("button").forEach(b => b.disabled = true)

            try {
                const method = action === "accept" ? "PATCH" : "DELETE"
                const url = `http://localhost:3000/v1/user/requests/${action}/${requesterID}`

                const res = await fetch(url, {
                    method,
                    credentials: "include"
                })
                const data = await res.json()
                console.log(data);

                if (data.success) {
                    // animate out
                    card.classList.add("removing")

                    setTimeout(() => {
                        card.remove()
                        updateBadge(-1)

                        // show empty state if no more requests
                        const list = document.getElementById("requestList")
                        if (!list.children.length) showEmptyState()

                    }, 300)

                } else {
                    // re-enable buttons on fail
                    card.querySelectorAll("button").forEach(b => b.disabled = false)
                    console.log(data.message)
                }

            } catch (error) {
                card.querySelectorAll("button").forEach(b => b.disabled = false)
                console.log(error)
            }
        }

        // ─────────────────────────
        // Badge helpers
        // ─────────────────────────
        let badgeCount = 0

        function updateBadge(change) {
            badgeCount += change
            const badge = document.getElementById("requestBadge")

            if (badgeCount > 0) {
                badge.style.display = "inline-block"
                badge.textContent = badgeCount
            } else {
                badge.style.display = "none"
                badgeCount = 0
            }
        }

        // ─────────────────────────
        // Empty state helpers
        // ─────────────────────────
        function showEmptyState() {
            document.getElementById("emptyState").style.display = "block"
        }

        function hideEmptyState() {
            document.getElementById("emptyState").style.display = "none"
        }

        // ─────────────────────────
        // Init
        // ─────────────────────────
        loadRequests()

    </script>
</body>

</html>
