<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatterra – Notifications</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./stylesheets/notification.css">
</head>

<body>
    <div class="app">

        <!-- ── SIDEBAR ── -->
        <aside class="sidebar" id="sidebar">
            <div class="sb-logo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8" />
                    <circle cx="12" cy="12" r="6" stroke="currentColor" stroke-width="1.4" />
                    <circle cx="12" cy="12" r="2.5" fill="currentColor" />
                    <line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.3" />
                    <line x1="12" y1="2" x2="12" y2="22" stroke="currentColor" stroke-width="1.3" />
                </svg>
                Chatterra
            </div>
            <nav class="sb-nav">
                <button class="sb-item" onclick='window.location.href="/feed.html"'>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    Home
                    </a>
                    <button class="sb-item" id="profile-button">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        Profile
                    </button>
                    <button class="sb-item" onclick='window.location.href="/chat.html"'>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                        </svg>
                        Messages
                    </button>
                    <button class="sb-item active" onclick='window.location.href="/notification.html"'>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                        </svg>
                        Notification
                    </button>
                    <button class="sb-item" onclick='window.location.href="/setting.html"'>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                        </svg>
                        Settings
                    </button>
            </nav>
            <div class="sb-bottom">
                <div class="sb-profile">
                    <div class="sb-avi" id="profile-photo-header">
                        <img src="" alt="">
                    </div>
                    <div>
                        <div class="sb-profile-name" id="profile-name-header"></div>
                        <div class="sb-profile-handle" id="profile-username-header"></div>
                    </div>
                </div>
            </div>
        </aside>
        <div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

        <!-- ── MAIN ── -->
        <div class="main">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="hamburger icon-btn" onclick="toggleSidebar()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round">
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <line x1="3" y1="12" x2="21" y2="12" />
                            <line x1="3" y1="18" x2="21" y2="18" />
                        </svg>
                    </button>
                    <span class="topbar-title">Notifications</span>
                </div>
                <div style="display:flex;align-items:center;gap:10px;">
                    <button class="icon-btn" onclick="markAllRead()" title="Mark all read">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12" />
                        </svg>
                    </button>
                    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                        <div class="theme-toggle-knob" id="themeKnob">
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" id="themeIcon">
                                <circle cx="12" cy="12" r="5" />
                                <line x1="12" y1="1" x2="12" y2="3" />
                                <line x1="12" y1="21" x2="12" y2="23" />
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                                <line x1="1" y1="12" x2="3" y2="12" />
                                <line x1="21" y1="12" x2="23" y2="12" />
                                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                            </svg>
                        </div>
                    </button>
                </div>
            </header>

            <div class="notif-page" id="notifPage">
                <!-- skeleton shown on load, replaced by real content -->
            </div>
        </div>
    </div>
    <div class="fr-overlay display-none" id="frOverlay">
        <div class="fr-panel" id="frPanel">

            <!-- header -->
            <div class="fr-header">
                <button class="fr-back" onclick="closeRequests()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </button>
                <h2 class="fr-title">Follow Requests</h2>
                <span class="fr-count" id="frCount"></span>
            </div>

            <!-- skeleton -->
            <div class="fr-skeleton" id="frSkeleton">
                <div class="fr-skel-item">
                    <div class="fr-skel fr-skel-avi"></div>
                    <div class="fr-skel-lines">
                        <div class="fr-skel fr-skel-a"></div>
                        <div class="fr-skel fr-skel-b"></div>
                    </div>
                    <div class="fr-skel fr-skel-btn"></div>
                </div>
                <div class="fr-skel-item">
                    <div class="fr-skel fr-skel-avi"></div>
                    <div class="fr-skel-lines">
                        <div class="fr-skel fr-skel-a"></div>
                        <div class="fr-skel fr-skel-b"></div>
                    </div>
                    <div class="fr-skel fr-skel-btn"></div>
                </div>
                <div class="fr-skel-item">
                    <div class="fr-skel fr-skel-avi"></div>
                    <div class="fr-skel-lines">
                        <div class="fr-skel fr-skel-a"></div>
                        <div class="fr-skel fr-skel-b"></div>
                    </div>
                    <div class="fr-skel fr-skel-btn"></div>
                </div>
            </div>

            <!-- list -->
            <div class="fr-list display-none" id="frList"></div>

            <!-- empty -->
            <div class="fr-empty display-none" id="frEmpty">
                <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"
                    stroke-linecap="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <p>No pending requests</p>
            </div>

        </div>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="./javascripts/notification.socket.js"></script>
    <script src="./javascripts/notification.request.js"></script>
    <script src="./javascripts/notification.js"></script>
</body>

</html>
