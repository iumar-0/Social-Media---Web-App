<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatterra – Profile</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./stylesheets/profile.css">
</head>

<body>
    <div class="app">

        <!-- ═══ SIDEBAR ═══ -->
        <aside class="sidebar" id="sidebar">
            <div class="sb-logo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8" />
                    <circle cx="12" cy="12" r="6" stroke="currentColor" stroke-width="1.4" />
                    <circle cx="12" cy="12" r="2.5" fill="currentColor" />
                    <line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.3" />
                    <line x1="12" y1="2" x2="12" y2="22" stroke="currentColor" stroke-width="1.3" />
                </svg>
                Chatterra
            </div>
            <nav class="sb-nav">
                <button class="sb-item" onclick='window.location.replace("/feed.html")'>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    Home
                    </a>
                    <button class="sb-item active" id="profile-button">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        Profile
                    </button>
                    <button class="sb-item" onclick='window.location.replace("/chat.html")'>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                        </svg>
                        Messages
                    </button>
                    <button class="sb-item" onclick='window.location.href="/notification.html"'>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                        </svg>
                        Notification
                    </button>
                    <button class="sb-item" onclick='window.location.replace("/setting.html")'>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                        </svg>
                        Settings
                    </button>
            </nav>
            <div class="sb-bottom">
                <div class="sb-profile">
                    <div class="sb-avi" id="profile-photo-header">
                        <img src="" alt="profile">
                    </div>
                    <div>
                        <div class="sb-profile-name" id="profile-name-header">name</div>
                        <div class="sb-profile-handle" id="profile-username-header">@username</div>
                    </div>
                </div>
            </div>
        </aside>
        <div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

        <!-- ═══ MAIN ═══ -->
        <div class="main">

            <!-- TOPBAR -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="hamburger icon-btn" onclick="toggleSidebar()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round">
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <line x1="3" y1="12" x2="21" y2="12" />
                            <line x1="3" y1="18" x2="21" y2="18" />
                        </svg>
                    </button>
                    <span class="topbar-title" id="topbarTitle">Profile</span>
                </div>
                <div class="topbar-right">
                    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                        <div class="theme-toggle-knob" id="themeKnob">
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" id="themeKnobIcon">
                                <circle cx="12" cy="12" r="5" />
                                <line x1="12" y1="1" x2="12" y2="3" />
                                <line x1="12" y1="21" x2="12" y2="23" />
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                                <line x1="1" y1="12" x2="3" y2="12" />
                                <line x1="21" y1="12" x2="23" y2="12" />
                                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                            </svg>
                        </div>
                    </button>
                </div>
            </header>

            <!-- PROFILE PAGE -->
            <div class="profile-page" id="profilePage">

                <!-- ── PROFILE HEADER SKELETON ── -->
                <div class="skel-profile-header" id="profileHeaderSkel">
                    <div class="skel skel-avi-big"></div>
                    <div class="skel-ph-right">
                        <div class="skel skel-ph-name"></div>
                        <div class="skel-ph-stats">
                            <div class="skel skel-ph-stat"></div>
                            <div class="skel skel-ph-stat"></div>
                            <div class="skel skel-ph-stat"></div>
                        </div>
                        <div class="skel skel-ph-bio"></div>
                        <div class="skel skel-ph-bio2"></div>
                    </div>
                </div>

                <!-- ── PROFILE HEADER (real) ── -->
                <div class="profile-header display-none">
                    <div class="profile-avatar-wrap" id="avatarWrap">
                        <div class="profile-avatar" id="profileAvatar">
                            <img id="profileAvatarImg" src="" alt="" />
                        </div>
                    </div>

                    <div class="profile-info">
                        <div class="profile-top-row">
                            <span class="profile-username" id="profileUsername">username</span>
                            <span class="pf-verified" id="pfVerified" style="display:none;">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M12 2C6.49 2 2 6.49 2 12C2 17.51 6.49 22 12 22C17.51 22 22 17.51 22 12C22 6.49 17.51 2 12 2ZM16.78 9.7L11.11 15.37C10.97 15.51 10.78 15.59 10.58 15.59C10.38 15.59 10.19 15.51 10.05 15.37L7.22 12.54C6.93 12.25 6.93 11.77 7.22 11.48C7.51 11.19 7.99 11.19 8.28 11.48L10.58 13.78L15.72 8.64C16.01 8.35 16.49 8.35 16.78 8.64C17.07 8.93 17.07 9.4 16.78 9.7Z"
                                        fill="#0073ff" />
                                </svg>
                            </span>
                            <div class="profile-actions" id="profile-follow-message">
                                <button class="btn-follow" id="followBtn" onclick="toggleFollow(this)">
                                    <span class="follow-label">Follow</span>
                                    <div class="follow-spin"></div>
                                </button>
                                <button class="btn-message" onclick="showToast(' Messages coming soon!')">Message
                                </button>
                            </div>
                            <div id="owner-profile-setting" class="display-none">
                                <button class="btn-settings">
                                    <a href="/setting.html">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round">
                                            <circle cx="12" cy="12" r="3" />
                                            <path
                                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                                        </svg>
                                    </a>
                                </button>
                            </div>
                        </div>
                        <div class="profile-stats">
                            <div class="stat"><span class="stat-num" id="statPosts">0</span><span
                                    class="stat-label">Posts</span></div>
                            <div class="stat">
                                <span class="stat-num" id="statFollowers">0</span>
                                <span class="stat-label">Followers</span>
                            </div>
                            <div class="stat"><span class="stat-num" id="statFollowing">0</span><span
                                    class="stat-label">Following</span></div>
                        </div>
                        <div class="profile-name-full" id="profileFullName"></div>
                        <div class="profile-bio" id="profileBio"></div>

                        <a class="profile-link display-none" id="profileLink" href="#" target="_blank">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round">
                                <circle cx="12" cy="12" r="10" />
                                <line x1="2" y1="12" x2="22" y2="12" />
                                <path
                                    d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                            </svg>
                            <span id="profileLinkText">umar@gmail.com</span>
                        </a>
                    </div>
                </div>

                <!-- ── TABS ── -->
                <div class="profile-tabs" id="profileTabs" style="display:none;">
                    <button class="tab-btn active" onclick="switchTab('posts',this)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round">
                            <rect x="3" y="3" width="7" height="7" />
                            <rect x="14" y="3" width="7" height="7" />
                            <rect x="3" y="14" width="7" height="7" />
                            <rect x="14" y="14" width="7" height="7" />
                        </svg>
                        Posts
                    </button>
                    <button class="tab-btn" onclick="switchTab('liked',this)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                        </svg>
                        Liked
                    </button>
                </div>

                <!-- ── GRID SKELETON ── -->
                <div class="skel-grid" id="gridSkel">
                    <div class="skel skel-cell"></div>
                    <div class="skel skel-cell"></div>
                    <div class="skel skel-cell"></div>
                    <div class="skel skel-cell"></div>
                    <div class="skel skel-cell"></div>
                    <div class="skel skel-cell"></div>
                </div>

                <!-- ── POST GRID ── -->
                <div class="post-grid display-none" id="postGrid"></div>

                <div class="private-profile display-none" id="profile-private">
                    <div class="pp-lock-wrap">
                        <div class="pp-lock-ring"></div>
                        <div class="pp-lock-icon">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </div>
                    </div>
                    <h2 class="pp-title">This account is private</h2>
                    <p class="pp-sub">Follow this account to see their photos and videos.</p>
                </div>

            </div>

            <div class="no-profile-found-class display-none" id="profile-not-found">
                <div class="pnf-icon">!</div>
                <h2 class="pnf-title">Profile isn't available</h2>
                <p class="pnf-sub">The link may be broken, or the profile may have been removed.</p>
                <button><a href="/login.html">Login Account</a></button>
            </div>

        </div><!-- /main -->

    </div><!-- /app -->

    <!-- ═══ POST MODAL (single post view) ═══ -->
    <div class="post-modal-overlay" id="postModalOverlay" onclick="handleModalOutside(event)">
        <div class="post-modal" id="postModalInner">
            <button class="post-modal-close" onclick="closePostModal()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
            <!-- post card injected here -->
            <div class="modal-loading" id="modalLoading">
                <div class="modal-spinner"></div>
            </div>
        </div>
    </div>

    <!-- ═══ COMMENT DRAWER ═══ -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="closeComments()"></div>
    <div class="comment-drawer" id="commentDrawer">
        <div class="drawer-handle"></div>
        <div class="drawer-head">
            Comments
            <span class="drawer-head-count" id="drawerCount"></span>
        </div>
        <div class="comments-list" id="commentsList">
            <div class="comments-empty" id="commentsEmpty">No comments yet. Be the first!</div>
        </div>
        <div class="drawer-input">
            <textarea id="commentInput" placeholder="Add a comment…" rows="1"
                oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendComment();}"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendComment()">
                <div class="send-spin"></div>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
            </button>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- POST TEMPLATE — same as home.html -->
    <template id="postTemplate">
        <div class="post-card">
            <div class="post-header">
                <div class="post-avi pc-avi" data-field="avi">
                    <img class="profile-photo-post" src="" alt="profile" />
                </div>
                <div class="post-meta">
                    <div class="post-username">
                        <span class="username-profile"></span>
                        <span class="pc-verified">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M12 2C6.49 2 2 6.49 2 12C2 17.51 6.49 22 12 22C17.51 22 22 17.51 22 12C22 6.49 17.51 2 12 2ZM16.78 9.7L11.11 15.37C10.97 15.51 10.78 15.59 10.58 15.59C10.38 15.59 10.19 15.51 10.05 15.37L7.22 12.54C6.93 12.25 6.93 11.77 7.22 11.48C7.51 11.19 7.99 11.19 8.28 11.48L10.58 13.78L15.72 8.64C16.01 8.35 16.49 8.35 16.78 8.64C17.07 8.93 17.07 9.4 16.78 9.7Z"
                                    fill="#0073ff" />
                            </svg>
                        </span>
                    </div>
                    <div class="post-time pc-time" data-field="time"></div>
                </div>
                <button class="pc-menu-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="5" r="1.5" />
                        <circle cx="12" cy="12" r="1.5" />
                        <circle cx="12" cy="19" r="1.5" />
                    </svg>
                </button>
            </div>
            <div class="pc-carousel" data-field="carousel">
                <div class="pc-carousel-track" data-field="track"></div>

                <button class="pc-arrow pc-arrow-left" data-field="arrow-left">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </button>
                <button class="pc-arrow pc-arrow-right" data-field="arrow-right">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round">
                        <polyline points="9 18 15 12 9 6" />
                    </svg>
                </button>
                <div class="pc-dots" data-field="dots"></div>
                <div class="pc-counter" data-field="counter"></div>
            </div>
            <div class="pc-actions">
                <div class="pc-actions-child-options">
                    <button class="pc-act-btn pc-like-btn" data-field="like-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                        </svg>
                        <span class="pc-btn-txt" data-field="like-count">0</span>
                        <div class="pc-btn-spin"></div>
                    </button>
                    <button class="pc-act-btn pc-comment-btn" data-field="comment-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                        </svg>
                        <span class="pc-btn-txt" data-field="comment-count">0</span>
                        <div class="pc-btn-spin"></div>
                    </button>
                </div>
                <button class="modal-menu-options">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="5" r="1.5" />
                        <circle cx="12" cy="12" r="1.5" />
                        <circle cx="12" cy="19" r="1.5" />
                    </svg>
                    <span class="modal-menu-options-options display-none">
                        <div id="username-loader-spin" class="spinner display-none"></div>
                        <p>delete</p>
                    </span>
                </button>
            </div>
            <div class="pc-caption display-none" data-field="caption">
                <strong data-field="cap-user"></strong>
                <span data-field="cap-text"></span>
            </div>
        </div>
    </template>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="./javascripts/hepler/likeHelper.js"></script>
    <script src="./javascripts/profile.js"></script>
</body>

</html>
